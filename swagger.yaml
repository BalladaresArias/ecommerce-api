openapi: 3.0.0
info:
  title: Ecommerce API
  description: API REST completa para e-commerce con autenticación JWT y roles
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Servidor local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Register:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Juan Pérez
        email:
          type: string
          example: juan@email.com
        password:
          type: string
          example: "123456"
        role:
          type: string
          enum: [admin, cliente]
          example: cliente

    Login:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: admin@ecommerce.com
        password:
          type: string
          example: password

    Product:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          example: iPhone 15
        description:
          type: string
          example: Último modelo de Apple
        price:
          type: number
          example: 999.99
        stock:
          type: integer
          example: 50
        category_id:
          type: integer
          example: 1
        image_url:
          type: string
          example: https://ejemplo.com/imagen.jpg

    Order:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                example: 1
              quantity:
                type: integer
                example: 2

    Category:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Electrónica
        description:
          type: string
          example: Dispositivos electrónicos

    OrderStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pendiente, pagado, enviado, entregado, cancelado]
          example: pagado

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
      responses:
        '201':
          description: Usuario registrado exitosamente
        '400':
          description: Datos inválidos o email ya registrado

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Login exitoso, retorna token JWT
        '401':
          description: Credenciales incorrectas

  /auth/profile:
    get:
      tags: [Auth]
      summary: Ver perfil del usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Datos del usuario
        '401':
          description: Token inválido

  /products:
    get:
      tags: [Products]
      summary: Obtener todos los productos (público)
      responses:
        '200':
          description: Lista de productos
    post:
      tags: [Products]
      summary: Crear producto (solo admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Producto creado
        '403':
          description: Sin permisos

  /products/{id}:
    get:
      tags: [Products]
      summary: Obtener un producto por ID (público)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Producto encontrado
        '404':
          description: Producto no encontrado
    put:
      tags: [Products]
      summary: Actualizar producto (solo admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Producto actualizado
        '403':
          description: Sin permisos
    delete:
      tags: [Products]
      summary: Eliminar producto (solo admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Producto eliminado
        '403':
          description: Sin permisos

  /categories:
    get:
      tags: [Categories]
      summary: Obtener todas las categorías (público)
      responses:
        '200':
          description: Lista de categorías
    post:
      tags: [Categories]
      summary: Crear categoría (solo admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
      responses:
        '201':
          description: Categoría creada
        '403':
          description: Sin permisos

  /categories/{id}:
    delete:
      tags: [Categories]
      summary: Eliminar categoría (solo admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoría eliminada
        '403':
          description: Sin permisos

  /orders:
    post:
      tags: [Orders]
      summary: Crear una orden (cliente y admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201':
          description: Orden creada exitosamente
        '400':
          description: Stock insuficiente o datos inválidos
    get:
      tags: [Orders]
      summary: Obtener todas las órdenes (solo admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de todas las órdenes
        '403':
          description: Sin permisos

  /orders/my-orders:
    get:
      tags: [Orders]
      summary: Ver mis órdenes (cliente y admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Órdenes del usuario autenticado

  /orders/{id}/status:
    put:
      tags: [Orders]
      summary: Actualizar estado de una orden (solo admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Estado actualizado
        '403':
          description: Sin permisos
